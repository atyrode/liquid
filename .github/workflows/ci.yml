name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  evaluate:
    name: evaluate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - name: Evaluate Pi image
        run: nix eval .#nixosConfigurations.pi3a.config.system.build.sdImage.drvPath
      - name: Evaluate GUI Pi image
        run: nix eval .#nixosConfigurations.pi3a-gui.config.system.build.sdImage.drvPath
      - name: Verify ARM package outputs
        run: |
          nix eval .#packages.aarch64-linux.pi3a-image.drvPath
          nix eval .#packages.aarch64-linux.pi3a-gui-image.drvPath
      - name: Verify SSH is enabled
        run: test "$(nix eval .#nixosConfigurations.pi3a.config.services.openssh.enable)" = true
      - name: Verify Bluetooth is enabled
        run: test "$(nix eval .#nixosConfigurations.pi3a.config.hardware.bluetooth.enable)" = true
      - name: Verify GUI is enabled
        run: test "$(nix eval .#nixosConfigurations.pi3a-gui.config.services.xserver.enable)" = true
      - name: Verify lightweight GUI is enabled
        run: test "$(nix eval .#nixosConfigurations.pi3a-gui.config.services.xserver.windowManager.icewm.enable)" = true
      - name: Verify GUI network panel is enabled
        run: test "$(nix eval .#nixosConfigurations.pi3a-gui.config.networking.networkmanager.enable)" = true
      - name: Verify GUI Bluetooth panel is enabled
        run: test "$(nix eval .#nixosConfigurations.pi3a-gui.config.services.blueman.enable)" = true
      - name: Verify Pi Bluetooth attach service
        run: nix eval .#nixosConfigurations.pi3a.config.systemd.services.btattach.serviceConfig.ExecStart | grep -q btattach
