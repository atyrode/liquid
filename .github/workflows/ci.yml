name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  evaluate:
    name: evaluate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check shell syntax
        run: |
          bash -n scripts/*.sh
          bash -n image/pre-image.sh
          bash -n image/files/home/artist/liquid-control/attach
          bash -n image/files/home/artist/liquid-control/bluetooth
          bash -n image/files/home/artist/liquid-control/config
          bash -n image/files/home/artist/liquid-control/doctor
          bash -n image/files/home/artist/liquid-control/start
          bash -n image/files/home/artist/liquid-control/stop
          bash -n image/files/home/artist/liquid-control/update
          bash -n image/files/usr/local/bin/liquid-bluetooth-keyboard
          bash -n image/files/usr/local/bin/liquid-run-terminal
          bash -n image/files/usr/local/bin/liquid-start
          bash -n image/files/usr/local/bin/liquid-update
          bash -n image/files/usr/local/sbin/liquid-bootstrap
          bash -n image/files/usr/local/sbin/liquid-doctor
          bash -n image/files/usr/local/sbin/liquid-grow-rootfs
          if command -v zsh >/dev/null 2>&1; then
            zsh -n image/files/home/artist/.zshrc
            zsh -n image/files/home/artist/.liquid-shell.zsh
            zsh -n image/files/home/artist/.liquid-shell.d/*.zsh
          else
            echo "zsh not installed; skipping zsh syntax check"
          fi
      - name: Verify image scripts match source scripts
        run: |
          cmp scripts/bootstrap-pi.sh image/files/usr/local/sbin/liquid-bootstrap
          cmp scripts/pi-doctor.sh image/files/usr/local/sbin/liquid-doctor
      - name: Check terminal renderer
        run: cargo check --manifest-path code/Cargo.toml --no-default-features --example terminal
      - name: Run ShellCheck when available
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck scripts/*.sh
            shellcheck image/pre-image.sh
            shellcheck image/files/home/artist/liquid-control/attach
            shellcheck image/files/home/artist/liquid-control/bluetooth
            shellcheck image/files/home/artist/liquid-control/config
            shellcheck image/files/home/artist/liquid-control/doctor
            shellcheck image/files/home/artist/liquid-control/start
            shellcheck image/files/home/artist/liquid-control/stop
            shellcheck image/files/home/artist/liquid-control/update
            shellcheck image/files/usr/local/bin/liquid-bluetooth-keyboard
            shellcheck image/files/usr/local/bin/liquid-run-terminal
            shellcheck image/files/usr/local/bin/liquid-start
            shellcheck image/files/usr/local/bin/liquid-update
            shellcheck image/files/usr/local/sbin/liquid-bootstrap
            shellcheck image/files/usr/local/sbin/liquid-doctor
            shellcheck image/files/usr/local/sbin/liquid-grow-rootfs
          else
            echo "shellcheck not installed; skipping"
          fi
