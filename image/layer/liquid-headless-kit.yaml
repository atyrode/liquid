# METABEGIN
# X-Env-Layer-Name: liquid-headless-kit
# X-Env-Layer-Category: liquid
# X-Env-Layer-Desc: Headless Liquid setup for Pi 3 A+ Wi-Fi, Bluetooth, SSH,
#  diagnostics, and local first-login recovery.
# X-Env-Layer-Version: 1.0.0
# X-Env-Layer-Requires: openssh-server
#
# X-Env-VarRequires: IGconf_device_user1
# X-Env-VarRequires-Valid: string
#
# X-Env-VarPrefix: liquid
#
# X-Env-Var-assets: ${DIRECTORY}/../files
# X-Env-Var-assets-Desc: Directory containing files to install into the image.
# X-Env-Var-assets-Required: n
# X-Env-Var-assets-Valid: string
# X-Env-Var-assets-Set: y
#
# X-Env-Var-repo_url: https://github.com/atyrode/liquid.git
# X-Env-Var-repo_url-Desc: Git repository cloned into the Pi image.
# X-Env-Var-repo_url-Required: n
# X-Env-Var-repo_url-Valid: string
# X-Env-Var-repo_url-Set: y
#
# X-Env-Var-repo_ref: main
# X-Env-Var-repo_ref-Desc: Git ref checked out in the baked repo copy.
# X-Env-Var-repo_ref-Required: n
# X-Env-Var-repo_ref-Valid: string
# X-Env-Var-repo_ref-Set: y
#
# X-Env-Var-runtime_branch: main
# X-Env-Var-runtime_branch-Desc: Local branch name configured in the baked repo.
# X-Env-Var-runtime_branch-Required: n
# X-Env-Var-runtime_branch-Valid: string
# X-Env-Var-runtime_branch-Set: y
#
# X-Env-Var-ohmyzsh_url: https://github.com/ohmyzsh/ohmyzsh.git
# X-Env-Var-ohmyzsh_url-Desc: Oh My Zsh repository cloned into the image.
# X-Env-Var-ohmyzsh_url-Required: n
# X-Env-Var-ohmyzsh_url-Valid: string
# X-Env-Var-ohmyzsh_url-Set: y
#
# X-Env-Var-ohmyzsh_ref: 5ef67beadbe371d7f4ed3a7456240e0fd46608ce
# X-Env-Var-ohmyzsh_ref-Desc: Pinned Oh My Zsh commit used by the image.
# X-Env-Var-ohmyzsh_ref-Required: n
# X-Env-Var-ohmyzsh_ref-Valid: string
# X-Env-Var-ohmyzsh_ref-Set: y
# METAEND
---
mmdebstrap:
  packages:
    - avahi-daemon
    - bat
    - bluez
    - btop
    - build-essential
    - ca-certificates
    - cargo
    - curl
    - dialog
    - fd-find
    - fastfetch
    - fzf
    - gh
    - git
    - iw
    - network-manager
    - nano
    - openssh-server
    - pkg-config
    - pi-bluetooth
    - python3
    - python3-pil
    - python3-pip
    - python3-venv
    - raspi-config
    - rfkill
    - ripgrep
    - rust-clippy
    - rustc
    - rustfmt
    - sudo
    - tmux
    - tree
    - wpasupplicant
    - zoxide
    - zsh
    - zsh-autosuggestions
    - zsh-syntax-highlighting
  customize-hooks:
    - install -Dm0755 "$IGconf_liquid_assets/usr/local/sbin/liquid-grow-rootfs" "$1/usr/local/sbin/liquid-grow-rootfs"
    - install -Dm0755 "$IGconf_liquid_assets/usr/local/bin/liquid" "$1/usr/local/bin/liquid"
    - install -Dm0644 "$IGconf_liquid_assets/etc/profile.d/liquid-dev-tools.sh" "$1/etc/profile.d/liquid-dev-tools.sh"
    - install -Dm0644 "$IGconf_liquid_assets/home/artist/.bashrc" "$1/home/$IGconf_device_user1/.bashrc"
    - install -Dm0644 "$IGconf_liquid_assets/home/artist/.zshrc" "$1/home/$IGconf_device_user1/.zshrc"
    - install -Dm0644 "$IGconf_liquid_assets/home/artist/.liquid-shell.zsh" "$1/home/$IGconf_device_user1/.liquid-shell.zsh"
    - install -Dm0644 "$IGconf_liquid_assets/home/artist/.liquid-shell.d/colors.zsh" "$1/home/$IGconf_device_user1/.liquid-shell.d/colors.zsh"
    - install -Dm0644 "$IGconf_liquid_assets/home/artist/.liquid-shell.d/utils.zsh" "$1/home/$IGconf_device_user1/.liquid-shell.d/utils.zsh"
    - install -Dm0644 "$IGconf_liquid_assets/home/artist/.liquid-shell.d/aliases.zsh" "$1/home/$IGconf_device_user1/.liquid-shell.d/aliases.zsh"
    - install -Dm0644 "$IGconf_liquid_assets/home/artist/.liquid-shell.d/python.zsh" "$1/home/$IGconf_device_user1/.liquid-shell.d/python.zsh"
    - install -Dm0644 "$IGconf_liquid_assets/home/artist/.liquid-shell.d/git.zsh" "$1/home/$IGconf_device_user1/.liquid-shell.d/git.zsh"
    - install -Dm0644 "$IGconf_liquid_assets/home/artist/.liquid-shell.d/zconf.zsh" "$1/home/$IGconf_device_user1/.liquid-shell.d/zconf.zsh"
    - install -Dm0644 "$IGconf_liquid_assets/home/artist/.liquid-shell.d/tmux.zsh" "$1/home/$IGconf_device_user1/.liquid-shell.d/tmux.zsh"
    - install -Dm0644 "$IGconf_liquid_assets/home/artist/.liquid-shell.d/startup.zsh" "$1/home/$IGconf_device_user1/.liquid-shell.d/startup.zsh"
    - install -d "$1/etc/NetworkManager/conf.d"
    - install -d "$1/etc/systemd/system/getty@tty1.service.d"
    - |-
      if [ -n "${IGconf_liquid_ohmyzsh_url:-}" ]; then
        rm -rf "$1/opt/oh-my-zsh"
        git clone "$IGconf_liquid_ohmyzsh_url" "$1/opt/oh-my-zsh"
        git -C "$1/opt/oh-my-zsh" checkout --detach "$IGconf_liquid_ohmyzsh_ref"
      fi
    - |-
      cat > "$1/etc/NetworkManager/conf.d/10-liquid-wifi.conf" <<'EOF'
      [device]
      wifi.backend=wpa_supplicant
      EOF
    - |-
      cat > "$1/etc/systemd/system/liquid-grow-rootfs.service" <<'EOF'
      [Unit]
      Description=Expand Liquid root filesystem on first boot
      ConditionPathExists=!/var/lib/liquid/rootfs-expanded
      After=local-fs.target
      Before=ssh.service NetworkManager.service

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/liquid-grow-rootfs

      [Install]
      WantedBy=multi-user.target
      EOF
    - |-
      cat > "$1/etc/systemd/system/liquid-renderer.service" <<EOF
      [Unit]
      Description=Start Liquid terminal renderer in tmux
      After=local-fs.target liquid-grow-rootfs.service
      ConditionPathExists=/home/$IGconf_device_user1/liquid/code/target/release/examples/terminal

      [Service]
      Type=oneshot
      User=$IGconf_device_user1
      Group=$IGconf_device_user1
      WorkingDirectory=/home/$IGconf_device_user1
      Environment=LIQUID_NO_FASTFETCH=1
      ExecStart=/usr/local/bin/liquid start
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
      EOF
    - |-
      cat > "$1/etc/systemd/system/getty@tty1.service.d/10-liquid-autologin.conf" <<EOF
      [Service]
      ExecStart=
      ExecStart=-/sbin/agetty --autologin $IGconf_device_user1 --noclear %I \$TERM
      EOF
    - |-
      if chroot "$1" id "$IGconf_device_user1" >/dev/null 2>&1; then
        chroot "$1" usermod -s /usr/bin/zsh "$IGconf_device_user1"
        if chroot "$1" getent group bluetooth >/dev/null 2>&1; then
          chroot "$1" adduser "$IGconf_device_user1" bluetooth || true
        fi
      fi
    - |-
      if [ -n "${IGconf_liquid_repo_url:-}" ]; then
        repo_dir="$1/home/$IGconf_device_user1/liquid"
        rm -rf "$repo_dir"
        git clone "$IGconf_liquid_repo_url" "$repo_dir"
        git -C "$repo_dir" checkout --detach "$IGconf_liquid_repo_ref"
        git -C "$repo_dir" checkout -B "$IGconf_liquid_runtime_branch"
        git -C "$repo_dir" branch --set-upstream-to="origin/$IGconf_liquid_runtime_branch" "$IGconf_liquid_runtime_branch" || true
        chroot "$1" chown -R "$IGconf_device_user1:$IGconf_device_user1" "/home/$IGconf_device_user1"
        if [ -f "$repo_dir/code/Cargo.toml" ]; then
          uchroot "$1" 'cd "$HOME/liquid/code" && cargo build --release --no-default-features --example terminal'
        fi
      fi
    - |-
      if chroot "$1" id "$IGconf_device_user1" >/dev/null 2>&1; then
        chroot "$1" chown -R "$IGconf_device_user1:$IGconf_device_user1" "/home/$IGconf_device_user1"
      fi
    - |-
      cat > "$1/etc/motd" <<'EOF'
      Liquid Raspberry Pi OS Lite

      First boot may reboot once while the root filesystem expands.

      Setup:
        1. The local console auto-logs in as artist.
        2. Set your own password with: sudo passwd artist
        3. Join Wi-Fi with: sudo nmtui
        4. Open the Liquid runtime menu with: liquid

      Dev tools:
        git, gh, cargo, rustc, rustfmt, clippy, zsh, fzf, zoxide,
        tree, bat, ripgrep, btop, tmux, fastfetch, oh-my-zsh

      Runtime:
        ~/liquid contains the baked Git checkout.
        Local renderer settings live in ~/liquid/.liquid/settings.env.
        The renderer starts detached in tmux session: liquid.
        The liquid menu handles renderer setup/control, Bluetooth, updates,
        and diagnostics.
      EOF
    - $BDEBSTRAP_HOOKS/enable-units "$1" ssh NetworkManager avahi-daemon bluetooth hciuart liquid-grow-rootfs liquid-renderer
    - $BDEBSTRAP_HOOKS/disable-units "$1" iwd systemd-networkd
