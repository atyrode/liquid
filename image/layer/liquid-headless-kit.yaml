# METABEGIN
# X-Env-Layer-Name: liquid-headless-kit
# X-Env-Layer-Category: liquid
# X-Env-Layer-Desc: Headless Liquid setup for Pi 3 A+ Wi-Fi, Bluetooth, SSH,
#  diagnostics, and local first-login recovery.
# X-Env-Layer-Version: 1.0.0
# X-Env-Layer-Requires: openssh-server
#
# X-Env-VarRequires: IGconf_device_user1
# X-Env-VarRequires-Valid: string
#
# X-Env-VarPrefix: liquid
#
# X-Env-Var-assets: ${DIRECTORY}/../files
# X-Env-Var-assets-Desc: Directory containing files to install into the image.
# X-Env-Var-assets-Required: n
# X-Env-Var-assets-Valid: string
# X-Env-Var-assets-Set: y
# METAEND
---
mmdebstrap:
  packages:
    - avahi-daemon
    - bat
    - bluez
    - btop
    - build-essential
    - ca-certificates
    - cargo
    - curl
    - fd-find
    - fastfetch
    - fzf
    - gh
    - git
    - iw
    - network-manager
    - openssh-server
    - pkg-config
    - pi-bluetooth
    - python3
    - python3-pil
    - python3-pip
    - python3-venv
    - raspi-config
    - rfkill
    - ripgrep
    - rust-clippy
    - rustc
    - rustfmt
    - sudo
    - tmux
    - tree
    - wpasupplicant
    - zoxide
    - zsh
    - zsh-autosuggestions
    - zsh-syntax-highlighting
  customize-hooks:
    - install -Dm0755 "$IGconf_liquid_assets/usr/local/sbin/liquid-bootstrap" "$1/usr/local/sbin/liquid-bootstrap"
    - install -Dm0755 "$IGconf_liquid_assets/usr/local/sbin/liquid-doctor" "$1/usr/local/sbin/liquid-doctor"
    - install -Dm0755 "$IGconf_liquid_assets/usr/local/sbin/liquid-grow-rootfs" "$1/usr/local/sbin/liquid-grow-rootfs"
    - install -Dm0644 "$IGconf_liquid_assets/etc/profile.d/liquid-dev-tools.sh" "$1/etc/profile.d/liquid-dev-tools.sh"
    - install -Dm0644 "$IGconf_liquid_assets/home/liquid/.bashrc" "$1/home/$IGconf_device_user1/.bashrc"
    - install -Dm0644 "$IGconf_liquid_assets/home/liquid/.zshrc" "$1/home/$IGconf_device_user1/.zshrc"
    - install -d "$1/etc/NetworkManager/conf.d"
    - install -d "$1/etc/systemd/system/getty@tty1.service.d"
    - |-
      cat > "$1/etc/NetworkManager/conf.d/10-liquid-wifi.conf" <<'EOF'
      [device]
      wifi.backend=wpa_supplicant
      EOF
    - |-
      cat > "$1/etc/systemd/system/liquid-grow-rootfs.service" <<'EOF'
      [Unit]
      Description=Expand Liquid root filesystem on first boot
      ConditionPathExists=!/var/lib/liquid/rootfs-expanded
      After=local-fs.target
      Before=ssh.service NetworkManager.service

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/liquid-grow-rootfs

      [Install]
      WantedBy=multi-user.target
      EOF
    - |-
      cat > "$1/etc/systemd/system/getty@tty1.service.d/10-liquid-autologin.conf" <<EOF
      [Service]
      ExecStart=
      ExecStart=-/sbin/agetty --autologin $IGconf_device_user1 --noclear %I \$TERM
      EOF
    - |-
      if chroot "$1" id "$IGconf_device_user1" >/dev/null 2>&1; then
        chroot "$1" chown "$IGconf_device_user1:$IGconf_device_user1" "/home/$IGconf_device_user1/.bashrc" "/home/$IGconf_device_user1/.zshrc"
        chroot "$1" usermod -s /usr/bin/zsh "$IGconf_device_user1"
      fi
    - |-
      cat > "$1/etc/motd" <<'EOF'
      Liquid Raspberry Pi OS Lite

      First boot may reboot once while the root filesystem expands.

      Setup:
        1. The local console auto-logs in as liquid.
        2. Set your own password with: sudo passwd liquid
        3. Join Wi-Fi with: sudo nmtui
        4. Inspect Wi-Fi/Bluetooth/SSH with: liquid-doctor

      Dev tools:
        git, gh, cargo, rustc, rustfmt, clippy, zsh, fzf, zoxide,
        tree, bat, ripgrep, btop, tmux, fastfetch

      Bluetooth:
        bluetoothctl
        power on
        agent on
        default-agent
        scan on
      EOF
    - $BDEBSTRAP_HOOKS/enable-units "$1" ssh NetworkManager avahi-daemon bluetooth hciuart liquid-grow-rootfs
    - $BDEBSTRAP_HOOKS/disable-units "$1" iwd systemd-networkd
